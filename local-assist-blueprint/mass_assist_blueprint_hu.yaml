blueprint:
  domain: automation
  name: Music Assistant - Helyi (kizĂĄrĂłlag) hangvezĂŠrlĂŠs terv
  source_url: https://github.com/music-assistant/voice-support/blob/main/local-assist-blueprint/mass_assist_blueprint_hu.yaml
  description: ' ![KĂŠp](https://github.com/music-assistant/voice-support/blob/main/assets/music-assistant.png?raw=true)

    # Zene lejĂĄtszĂĄsa hangparancsokkal

    ### BeĂĄllĂ­tĂĄs

    #### KĂśtelezĹ

    * ĂllĂ­ts be egy `AlapĂŠrtelmezett lejĂĄtszĂłt`, amelyet akkor hasznĂĄl a rendszer, ha
    a kĂŠrĂŠsben nem szerepel cĂŠleszkĂśz, ĂŠs a kĂŠrĂŠs nem olyan terĂźletrĹl ĂŠrkezik, ahol
    Music Assistant lejĂĄtszĂł talĂĄlhatĂł.

    #### OpcionĂĄlis

    * MĂłdosĂ­tsd az aktivĂĄlĂł mondatokat vagy adj hozzĂĄ Ăşjakat, ezzel a sajĂĄt nyelvedre
    is lefordĂ­thatod a mondatokat.

    * MĂłdosĂ­tsd a vĂĄlaszokat vagy fordĂ­tsd le a sajĂĄt nyelvedre.


    ### HasznĂĄlat

    Minden mondatnak:

    * a `JĂĄtszd le`, `JĂĄtszd`, `Keverj`, `LejĂĄtszĂĄs` vagy `Hallgassuk` szĂłval kell
    kezdĹdnie, amelyet a mĂŠdiatĂ­pus kĂśvet: `elĹadĂł`/`szĂĄm`/`album`/`lejĂĄtszĂĄsi lista`/`rĂĄdiĂł`,
    majd a kĂ­vĂĄnt elem neve. Ha a mondat a `Keverj` szĂłval kezdĹdik, a lejĂĄtszĂł vĂŠletlenszerĹą
    sorrendben jĂĄtssza le a szĂĄmokat, egyĂŠbkĂŠnt kikapcsolja a keverĂŠst.

    * album ĂŠs szĂĄm esetĂŠn opcionĂĄlisan kĂśvetheti a `tĹle` vagy `elĹadĂłtĂłl` kifejezĂŠs
    ĂŠs az elĹadĂł neve

    * ezutĂĄn opcionĂĄlisan megadhatĂł a terĂźlet vagy az eszkĂśz neve

    * elĹadĂł, szĂĄm, album ĂŠs lejĂĄtszĂĄsi lista esetĂŠn opcionĂĄlisan kĂśvetheti
    a `rĂĄdiĂł mĂłdban` kifejezĂŠs

    #### Elfogadott vĂĄltozatok

    a hatĂĄrozott nĂŠvelĹ (`a`, `az`) hasznĂĄlata opcionĂĄlis

    |MĂŠdiatĂ­pus|Elfogadott vĂĄltozatok|

    |---|---|

    |`elĹadĂł`|`zenĂŠsz`, `banda`, `egyĂźttes`, `zenekar`|

    |`szĂĄm`|`dal`, `szĂĄmot`, `dalt`|

    |`album`|`lemez`, `kislemez`, `nagylemez`|

    |`rĂĄdiĂł`|`rĂĄdiĂłĂĄllomĂĄs`, `rĂĄdiĂładĂł`, `ĂĄllomĂĄs`|

    |`lejĂĄtszĂĄsi lista`|`playlist`|


    #### PĂŠldĂĄk

    ```

    JĂĄtszd le az elĹadĂłt Pink Floyd a konyhĂĄban

    Hallgassuk az albumot Jagged Little Pill a dolgozĂłszobĂĄban

    Hallgassuk az albumot Greatest Hits az elĹadĂłtĂłl James Taylor a konyhĂĄban

    JĂĄtszd le a szĂĄmot New Years Day a hĂĄlĂłszobĂĄban

    JĂĄtszd le a szĂĄmot New Years Day a hĂĄlĂłszobĂĄban rĂĄdiĂł mĂłdban

    JĂĄtszd le a dalt A Hard Days Night az elĹadĂłtĂłl Billy Joel a hĂĄlĂłszobĂĄban

    Hallgassuk a lejĂĄtszĂĄsi listĂĄt Classic Rock a dolgozĂłszobĂĄban

    Hallgassuk a rĂĄdiĂłĂĄllomĂĄst BBC Radio 1 a hĂĄlĂłszobĂĄban

    JĂĄtszd le az albumot Classical Nights a hĂĄlĂłszobai Sonos hangszĂłrĂłn

    Hallgassuk a lemezt Classical Nights a hĂĄlĂłszobai Sonos hangszĂłrĂłn

    JĂĄtszd le a zenekart U2

    Keverj dalokat a Muse-tĂłl.

    Keverj az albumbĂłl Classical Nights a hĂĄlĂłszobai Sonos hangszĂłrĂłn

    JĂĄtszd le a hangoskĂśnyvet Roadside Picnic

    ```'
  input:
    default_player_entity_id_input:
      name: AlapĂŠrtelmezett lejĂĄtszĂł
      selector:
        entity:
          filter:
          - integration: music_assistant
            domain:
            - media_player
          multiple: false
    trigger_response_settings:
      name: AktivĂĄlĂĄs ĂŠs vĂĄlaszbeĂĄllĂ­tĂĄsok az Asszisztenshez
      icon: mdi:chat
      description: 'Ezekben a beĂĄllĂ­tĂĄsokban mĂłdosĂ­thatod a meglĂŠvĹ aktivĂĄlĂł mondatokat
        vagy hozzĂĄadhatsz Ăşjakat. A szĂśgletes zĂĄrĂłjelek [ ] kĂśzĂŠ zĂĄrt szĂśveg opcionĂĄlis.
        A kerek zĂĄrĂłjelek ( ) ĂŠs a fĂźggĹleges vonal | segĂ­tsĂŠgĂŠvel tĂśbb ĂŠrtĂŠket adhatsz
        meg, amelyek ''vagy'' kapcsolatban ĂĄllnak. A { lekĂŠrdezĂŠs } egy helyettesĂ­tĹ
        ĂŠrtĂŠk, amely a kĂŠrt mĂŠdiĂĄt ĂŠs opcionĂĄlisan a terĂźletet vagy Music Assistant
        lejĂĄtszĂłt tartalmazza.

        BeĂĄllĂ­thatod az Asszisztens vĂĄlaszait is. A vĂĄlaszok jinja sablonokat hasznĂĄlnak,
        amelyekbe a mĂŠdiaadatok ĂŠs a Music Assistant lejĂĄtszĂł neve kerĂźl.'
      collapsed: true
      input:
        album_trigger:
          name: Album aktivĂĄlĂł
          description: AktivĂĄlĂł mondatok egy adott album lejĂĄtszĂĄsĂĄhoz.
          selector:
            text:
              multiline: false
              multiple: true
          default:
          - (keverj|jĂĄtszd le|jĂĄtszd|hallgassuk|lejĂĄtszĂĄs) [a |az ](albumot|albumĂĄt|lemezt|kislemezt|nagylemezt)
            {media_name} [az elĹadĂłtĂłl [a |az ](elĹadĂł|zenĂŠsz|banda|egyĂźttes|zenekar)
            {artist}] [(a |az |ban |ben |on |Ăśn |en ){area_or_player_name}][ (rĂĄdiĂł|rĂĄdiĂł
            mĂłdban) {radio_mode}]
        track_trigger:
          name: SzĂĄm aktivĂĄlĂł
          description: AktivĂĄlĂł mondatok egy adott szĂĄm lejĂĄtszĂĄsĂĄhoz.
          selector:
            text:
              multiline: false
              multiple: true
          default:
          - (keverj|jĂĄtszd le|jĂĄtszd|hallgassuk|lejĂĄtszĂĄs) [a |az ](szĂĄmot|dalt) {media_name}
            [az elĹadĂłtĂłl [a |az ](elĹadĂł|zenĂŠsz|banda|egyĂźttes|zenekar) {artist}] [(a
            |az |ban |ben |on |Ăśn |en ){area_or_player_name}][ (rĂĄdiĂł|rĂĄdiĂł mĂłdban) {radio_mode}]
        artist_trigger:
          name: ElĹadĂł aktivĂĄlĂł
          description: AktivĂĄlĂł mondatok egy adott elĹadĂł zenĂŠjĂŠnek lejĂĄtszĂĄsĂĄhoz.
          selector:
            text:
              multiline: false
              multiple: true
          default:
          - (keverj|jĂĄtszd le|jĂĄtszd|hallgassuk|lejĂĄtszĂĄs) [a |az ](elĹadĂłt|zenĂŠszt|bandĂĄt|egyĂźttest|zenekart)
            {media_name} [(a |az |ban |ben |on |Ăśn |en ){area_or_player_name}][ (rĂĄdiĂł|rĂĄdiĂł
            mĂłdban) {radio_mode}]
        audiobook_trigger:
          name: HangoskĂśnyv aktivĂĄlĂł
          description: AktivĂĄlĂł mondatok egy hangoskĂśnyv lejĂĄtszĂĄsĂĄhoz.
          selector:
            text:
              multiline: false
              multiple: true
          default:
          - (jĂĄtszd le|jĂĄtszd|hallgassuk|lejĂĄtszĂĄs) [a |az ](hangoskĂśnyvet|kĂśnyvet) {media_name}
            [(a |az |ban |ben |on |Ăśn |en ){area_or_player_name}]
        radio_trigger:
          name: RĂĄdiĂł aktivĂĄlĂł
          description: AktivĂĄlĂł mondatok egy rĂĄdiĂłĂĄllomĂĄs lejĂĄtszĂĄsĂĄhoz.
          selector:
            text:
              multiline: false
              multiple: true
          default:
          - (keverj|jĂĄtszd le|jĂĄtszd|hallgassuk|lejĂĄtszĂĄs) [a |az ](rĂĄdiĂłĂĄllomĂĄst|rĂĄdiĂłt|rĂĄdiĂładĂłt|ĂĄllomĂĄst)
            {media_name} [(a |az |ban |ben |on |Ăśn |en ){area_or_player_name}]
        playlist_trigger:
          name: LejĂĄtszĂĄsi lista aktivĂĄlĂł
          description: AktivĂĄlĂł mondatok egy lejĂĄtszĂĄsi lista lejĂĄtszĂĄsĂĄhoz.
          selector:
            text:
              multiline: false
              multiple: true
          default:
          - (keverj|jĂĄtszd le|jĂĄtszd|hallgassuk|lejĂĄtszĂĄs) [a |az ](lejĂĄtszĂĄsi listĂĄt|playlistet)
            {media_name} [(a |az |ban |ben |on |Ăśn |en ){area_or_player_name}][ (rĂĄdiĂł|rĂĄdiĂł
            mĂłdban) {radio_mode}]
        response_input:
          name: VĂĄlasz az AsszisztenstĹl
          description: Az Asszisztens ĂĄltal adott vĂĄlasz.
          selector:
            text:
              multiline: false
              multiple: false
          default: '{{ ''KeverĂŠs:'' if ''keverj'' in trigger.sentence | lower else ''''}}
            {{ trigger.slots.media_name }} {{ '''' if ''keverj'' in trigger.sentence |
            lower else ''lejĂĄtszĂĄsa''}} ezen: {{ mass_player_name }}'
triggers:
- trigger: conversation
  command: !input album_trigger
  id: album
- trigger: conversation
  command: !input track_trigger
  id: track
- trigger: conversation
  command: !input artist_trigger
  id: artist
- trigger: conversation
  command: !input audiobook_trigger
  id: audiobook
- trigger: conversation
  command: !input radio_trigger
  id: radio
- trigger: conversation
  command: !input playlist_trigger
  id: playlist
actions:
- alias: VĂĄltozĂłk definiĂĄlĂĄsa az automatizĂĄciĂłhoz
  variables:
    version: 20250404
    shuffle: '{{ ''keverj'' in trigger.sentence | lower }}'
    default_player_entity_id: !input default_player_entity_id_input
    trigger_id: '{{ trigger.id }}'
    area_or_player_name: '{{ trigger.slots.area_or_player_name | default }}'
    assist_device_id: '{{ trigger.device_id }}'
    action_data:
      media_id: '{{ trigger.slots.media_name }}'
      media_type: '{{ ''radio'' if ''rĂĄdiĂł'' in media_name | lower else trigger_id
        }}'
      artist: '{{ trigger.slots.artist | default }}'
      radio_mode: '{{ ''rĂĄdiĂł'' in trigger.slots.radio_mode | default | lower }}'
    ma_players: '{{  integration_entities(''music_assistant'') | select(''match'', ''media_player'') | list }}'
    player_entity_id_by_player_name: "{{ ma_players |
      expand \n  | selectattr('name', 'match', area_or_player_name ~ '$', ignorecase=true)\n
      \ | map(attribute='entity_id') | list }}\n"
    player_entity_id_by_area_name: '{{ areas() | map(''area_name'') | select(''match'',
      area_or_player_name ~ ''$'',  ignorecase=true) | map(''area_entities'') | sum(start=[])
      | select(''in'',  ma_players) | list }}

      '
    player_entity_id_by_assist_area: '{{ area_entities(area_id(trigger.device_id))
      | select(''in'', ma_players) | list }}

      '
    mass_player_entity_id: "{{ player_entity_id_by_player_name or player_entity_id_by_area_name
      \nor player_entity_id_by_assist_area or [default_player_entity_id] }}\n"
    mass_player_name: '{{ mass_player_entity_id | map(''state_attr'', ''friendly_name'')
      | join('', '') }}'
- alias: MĂŠdia kĂźldĂŠse a kivĂĄlasztott Music Assistant lejĂĄtszĂłnak
  action: music_assistant.play_media
  data: '{{ dict(action_data.items() | selectattr(''1'')) }}'
  target:
    entity_id: '{{ mass_player_entity_id }}'
- alias: KeverĂŠs be/kikapcsolĂĄsa a Music Assistant lejĂĄtszĂłn
  action: media_player.shuffle_set
  data:
    shuffle: '{{ shuffle }}'
  target:
    entity_id: '{{ mass_player_entity_id }}'
- alias: VĂĄlasz visszakĂźldĂŠse
  set_conversation_response: !input response_input
mode: single
